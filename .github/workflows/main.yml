name: Greathost-AutoRenew-PY

on:
  schedule:
    - cron: '0 */10 * * *'  # 每 10 小时运行一次
  workflow_dispatch:

jobs:
  Auto_renew_greathost:
    runs-on: ubuntu-latest
    
    permissions:
      actions: write
      contents: write   
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. 安装 Chrome 浏览器并清理系统残留驱动
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # 关键：彻底清理虚拟环境自带的驱动，防止干扰
          sudo rm -rf /usr/bin/chromedriver
          sudo rm -rf /usr/local/bin/chromedriver

      # 3. 安装依赖 (移除了 selenium-wire，增加了 webdriver-manager)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            selenium==4.18.1 \
            requests[socks] \
            webdriver-manager

      # 4. 启动 Xray 代理 (保持你原有的逻辑)
      - name: 🌐 启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray_bin
          echo "$V2RAY_CONFIG" > xray_bin/config.json
          cd xray_bin
          nohup ./xray run -c config.json > xray.log 2>&1 &
          cd ..
          sleep 10
          echo "🌐 测试代理连通性..."
          curl -x http://127.0.0.1:10808 -I https://www.google.com/generate_204 || echo "⚠️ 代理测试未通过"

      # 5. 运行 Python 脚本
      - name: Run renew script
        env:
          GREATHOST_EMAIL: ${{ secrets.GREATHOST_EMAIL }}
          GREATHOST_PASSWORD: ${{ secrets.GREATHOST_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}    
          PROXY_URL: "socks5h://127.0.0.1:10808" 
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: python ghost.py

      # 6. 更新 README
      - name: Push README changes
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: update renewal status [skip ci]" || exit 0
          git push

      # 7. 🧹 清理运行记录
      - name: 🧹 Delete old runs
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 3600
