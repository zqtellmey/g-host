name: Greathost-AutoRenew-PY

on:
  schedule:
    - cron: '0 */10 * * *'  # 每 10 小时运行一次
  workflow_dispatch:

jobs:
  Auto_renew_greathost:
    runs-on: ubuntu-latest
    
    permissions:
      actions: write
      contents: write   
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2. 安装 Chrome 浏览器并清理系统残留驱动
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # 关键：彻底清理虚拟环境自带的驱动，防止干扰
          sudo rm -rf /usr/bin/chromedriver
          sudo rm -rf /usr/local/bin/chromedriver

      # 3. 安装依赖 (移除了 selenium-wire，增加了 webdriver-manager)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            selenium==4.18.1 \
            requests[socks] \
            webdriver-manager

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup host2play.gratis 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      # 5. 运行 Python 脚本
      - name: Run renew script
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}    
       #   PROXY_URL: "socks5h://127.0.0.1:10808" 
       #   TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: python ghost.py

      # 6. 更新 README
    #  - name: Push README changes
   #     if: always()
   #     run: |
    #      git config --local user.email "github-actions[bot]@users.noreply.github.com"
     #     git config --local user.name "github-actions[bot]"
   #       git add README.md
    #      git commit -m "docs: update renewal status [skip ci]" || exit 0
    #      git push

      # 7. 🧹 清理运行记录
      - name: 🧹 Delete old runs
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository: ${{ github.repository }}
          older-than-seconds: 3600
